<svg xmlns="http://www.w3.org/2000/svg" width="360" height="96" viewBox="0 0 360 96" role="img" aria-labelledby="title desc">
  <title id="title">Логотип VIPАвто 161</title>
  <desc id="desc">Плашка с логотипом VIPАвто 161</desc>
  <defs>
    <linearGradient id="plateBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFDFD"/>
      <stop offset="100%" stop-color="#F1F2F4"/>
    </linearGradient>
    <linearGradient id="neonLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CCFF00"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
    <filter id="plateShadow" x="-10%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0B1020" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#plateShadow)">
    <rect x="6" y="8" width="348" height="80" rx="18" fill="url(#plateBg)" stroke="#D8DCE3" stroke-width="2"/>
    <rect x="16" y="16" width="328" height="64" rx="12" fill="#FFFFFF" opacity="0.65"/>
  </g>

  <path d="M26 78h308" stroke="url(#neonLine)" stroke-width="3" stroke-linecap="round"/>

  <text x="34" y="62" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#0B1020" letter-spacing="-1.2">VIP</text>
  <text x="132" y="62" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#151A2E" letter-spacing="-1.4">Авто</text>
  <text x="286" y="62" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0B1020">161</text>
</svg>
